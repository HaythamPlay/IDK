<span class="heart-text">NO DEBERIAS ESTAR AQUI</span>

            <input id="messageState" type="checkbox" style="display:none"/>

                <h1 style="font-family: Cinzel, serif; font-size: 40px; letter-spacing: 1.2px;">Para:¿F?,</h1>

        <!-- Agregar el audio -->
        <audio id="audioPlayer">
            <source src="Dark%20Side%20Español.mp3" type="audio/mp3">
            Tu navegador no soporta el formato de audio.
        </audio>

        <script src="jquery.js"></script>
        <script src="jquery2.1.js"></script>
        <script defer src="valentine-confession.js"></script>

        <script>
            // Configurar el volumen a 0.2
            var audio = document.getElementById('audioPlayer');
            audio.volume = 0.2;

            // Variable para saber si la música ya se reprodujo
            var hasPlayed = false;

            // Hacer que la música suene solo una vez al hacer clic en cualquier parte de la página
            document.body.addEventListener('click', function() {
                if (!hasPlayed) {
                    audio.play(); // Reproducir música solo si no ha sido reproducida
                    hasPlayed = true; // Marcar que la música ha sido reproducida
                }
            });
        </script>
